{{ define "main" }}
<section class="page-content">
  <div class="container">
    <nav class="breadcrumb">
      <a href="/{{ .Language.Lang }}/">{{ i18n "home" | default "Home" }}</a> /
      <span>{{ .Title }}</span>
    </nav>

    <div class="content-wrapper">
      <h1>{{ .Title }}</h1>
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
