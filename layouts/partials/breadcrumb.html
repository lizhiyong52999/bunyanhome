<nav class="breadcrumb" aria-label="Breadcrumb">
    <ol class="breadcrumb-list">
        <li class="breadcrumb-item">
            <a href="{{ .Site.BaseURL }}">
                <i class="fas fa-home"></i>
                <span>{{ i18n "breadcrumb_home" }}</span>
            </a>
        </li>
        
        {{ if .CurrentSection }}
        <li class="breadcrumb-item">
            <i class="fas fa-chevron-right"></i>
            <a href="{{ .CurrentSection.RelPermalink }}">{{ .CurrentSection.Title }}</a>
        </li>
        {{ end }}
        
        {{ if ne .Type "home" }}
        <li class="breadcrumb-item active">
            <i class="fas fa-chevron-right"></i>
            <span>{{ .Title }}</span>
        </li>
        {{ end }}
    </ol>
</nav>

<style>
.breadcrumb {
    padding: 1rem 0;
    background: #f8f9fa;
    border-bottom: 1px solid #e9ecef;
}

.breadcrumb-list {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 0.875rem;
    flex-wrap: wrap;
}

.breadcrumb-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.breadcrumb-item a {
    color: #007bff;
    text-decoration: none;
    transition: color 0.2s;
}

.breadcrumb-item a:hover {
    color: #0056b3;
    text-decoration: underline;
}

.breadcrumb-item.active {
    color: #6c757d;
}

.breadcrumb-item i {
    font-size: 0.75rem;
    color: #adb5bd;
}

/* RTL Support */
[dir="rtl"] .breadcrumb-list {
    flex-direction: row-reverse;
}

[dir="rtl"] .breadcrumb-item i {
    transform: rotate(180deg);
}
</style>
